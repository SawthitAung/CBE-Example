        ...mcq_questions,

      // --- CORE ENGINE ---
      let currentIdx = 0;
      let userAnswers = new Array(questions.length).fill(null);
      let timeLeft = 10800;

      function startTimer() {
        setInterval(() => {
          let h = Math.floor(timeLeft / 3600);
          let m = Math.floor((timeLeft % 3600) / 60);
          let s = timeLeft % 60;
          document.getElementById("timer").innerText =
            `${h.toString().padStart(2, "0")}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
          if (timeLeft > 0) timeLeft--;
          else finishExam();
        }, 1000);
      }

      function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById("question-number").innerText =
          `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById("section-name").innerText = q.section;
        document.getElementById("question-text").innerText = q.text;

        // loadQuestion() function ထဲမှာ ရှာပြီး ဒါနဲ့ အစားထိုးပါ
        // loadQuestion() ထဲက image အပိုင်းမှာ ဒါလေးပဲ ထားပါ
        const imgCont = document.getElementById("image-container");
        imgCont.innerHTML = q.image
          ? `<img src="${q.image}" alt="Question Diagram">`
          : "";
        const optCont = document.getElementById("options");
        imgCont.innerHTML = q.image
          ? `<img src="${q.image}" style="max-height:180px; margin-bottom:15px; border-radius:10px;">`
          : "";
        optCont.innerHTML = "";

        if (["mcq", "tf", "label"].includes(q.type)) {
          q.options.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = `opt-box ${userAnswers[currentIdx] === i ? "selected" : ""}`;
            div.innerText = opt;
            div.onclick = () => {
              userAnswers[currentIdx] = i;
              loadQuestion();
            };
            optCont.appendChild(div);
          });
        } else if (q.type === "fill" || q.type === "calc") {
          const input = document.createElement("input");
          input.type = "text";
          input.className = "opt-box";
          input.style.width = "100%";
          input.value = userAnswers[currentIdx] || "";
          input.placeholder = "Type answer here...";
          input.oninput = (e) => {
            userAnswers[currentIdx] = e.target.value;
            updateMap();
          };
          optCont.appendChild(input);
        } else if (q.type === "essay") {
          const txt = document.createElement("textarea");
          txt.className = "opt-box";
          txt.style.width = "100%";
          txt.style.height = "120px";
          txt.value = userAnswers[currentIdx] || "";
          txt.oninput = (e) => {
            userAnswers[currentIdx] = e.target.value;
            updateMap();
          };
          optCont.appendChild(txt);
        } else if (q.type === "draw") {
          optCont.innerHTML =
            '<canvas id="canv" width="500" height="200" style="border:2px dashed #999; background:#fff;"></canvas>';
          setupCanvas();
        }

        const isLast = currentIdx === questions.length - 1;
        document.getElementById("next-btn").classList.toggle("hidden", isLast);
        document
          .getElementById("submit-btn")
          .classList.toggle("hidden", !isLast);
        document.getElementById("prev-btn").disabled = currentIdx === 0;
        updateMap();
      }

      function updateMap() {
        const grid = document.getElementById("question-grid");
        grid.innerHTML = "";

        let lastSection = "";

        questions.forEach((q, i) => {
          // Section အသစ်ရောက်တိုင်း ခေါင်းစဉ် (Label) ထည့်ပေးခြင်း
          if (q.section !== lastSection) {
            const label = document.createElement("div");
            label.innerText = q.section;
            label.style.gridColumn = "1 / -1"; // ဘေးအပြည့်ယူမယ်
            label.style.fontSize = "12px";
            label.style.marginTop = "10px";
            label.style.color = "var(--gold)";
            label.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            grid.appendChild(label);
            lastSection = q.section;
          }

          const s = document.createElement("span");
          s.innerText = i + 1;
          if (userAnswers[i] !== null && userAnswers[i] !== "")
            s.className = "answered";
          if (i === currentIdx) s.classList.add("current");
          s.onclick = () => {
            currentIdx = i;
            loadQuestion();
          };
          grid.appendChild(s);
        });
      }

      function setupCanvas() {
        const c = document.getElementById("canv");
        if (!c) return;
        const ctx = c.getContext("2d");
        let drawing = false;
        c.onmousedown = () => (drawing = true);
        c.onmouseup = () => {
          drawing = false;
          ctx.beginPath();
          userAnswers[currentIdx] = "Drawn";
          updateMap();
        };
        c.onmousemove = (e) => {
          if (!drawing) return;
          const r = c.getBoundingClientRect();
          ctx.lineWidth = 2;
          ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
          ctx.stroke();
        };
      }

      function finishExam() {
        document.getElementById("question-box").classList.add("hidden");
        document.getElementById("nav-footer").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");

        let score = 0;
        questions.forEach((q, i) => {
          if (["mcq", "tf", "label"].includes(q.type)) {
            if (userAnswers[i] === q.correct) score++;
          } else if (["fill", "calc"].includes(q.type)) {
            if (
              userAnswers[i] &&
              userAnswers[i].toLowerCase().trim() === q.correct.toLowerCase()
            )
              score++;
          } else if (userAnswers[i]) {
            score++;
          }
        });

        const finalPercent = Math.round((score / questions.length) * 100);
        document.getElementById("score-percentage").innerText =
          finalPercent + "%";
      }

      function nextQuestion() {
        if (currentIdx < questions.length - 1) {
          currentIdx++;
          loadQuestion();
        }
      }
      function prevQuestion() {
        if (currentIdx > 0) {
          currentIdx--;
          loadQuestion();
        }
      }

      window.onload = () => {
        startTimer();
        loadQuestion();
      };
